name: CI

# Temporarily disabled - needs better strategy for handling SwiftLint + tests
# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
    
    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint
      run: swiftlint

    - name: Make scripts executable
      run: chmod +x scripts/*.sh

    - name: List Available Simulators
      run: xcrun simctl list devices available

    - name: Run Tests
      env:
        # Use a more generic simulator configuration for CI
        # GitHub Actions may not have the exact simulator versions we use locally
        SIM_DEST: "platform=iOS Simulator,name=iPhone 15 Pro"
      run: ./scripts/test.sh
